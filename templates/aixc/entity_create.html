{% extends 'aix/layouts/content_layout_2.html' %}
{% load i18n %}
{% load static %}
{% load aix %}

{% block view_content %}
    <form action="{% url 'aix:entity-create' %}"
          method="post">
        <div class="columns is-multiline is-centered">
            {% csrf_token %}
            <div class="column is-6">
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-header-title">
                                    <span class="icon">
                                        {#<i class="iconify djl-icon-36" data-icon="ic:baseline-business" data-inline="false"></i>#}
                                    </span>
                            {% trans 'New Company Information' %}</h2>
                    </div>
                    <div class="card-body">
                        {{ form.as_p }}
                        <button type="submit"
                                class="btn btn-primary is-outlined is-fullwidth djetler_my_1">Create
                        </button>
                        <a href="{% url 'aix:home' %}"
                           class="btn-sm btn-dark is-fullwidth">Back</a>
                    </div>
                </div>
            </div>
        </div>
    </form>
{% endblock %}
