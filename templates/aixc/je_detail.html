{% extends 'aix/base.html' %}
{% load i18n %}
{% load static %}
{% load aix %}

{% block content %}
    <div class="columns is-centered">
        <div class="column">
            <div class="card">
        <div class="card-body">
                {% journal_entry_txs_table journal_entry %}
                <a class="btn btn-primary is-outlined"
                   href="{% url 'aix:txs-journal-entry' entity_slug=view.kwargs.entity_slug ledger_pk=view.kwargs.ledger_pk je_pk=journal_entry.uuid %}">Edit
                    Txs</a>
                <a class="btn btn-dark"
                   href="{% url 'aix:je-list' entity_slug=view.kwargs.entity_slug ledger_pk=view.kwargs.ledger_pk %}">Back</a>
            </div>
        </div>
    </div>
{% endblock %}
