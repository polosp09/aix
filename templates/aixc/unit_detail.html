{% extends 'aix/base.html' %}
{% load i18n %}
{% load static %}
{% load aix %}

{% block content %}
    <div class="card">
        <div class="card-body">
            <div class="level">
                <div class="level-left">
                    <div class="level-item">
                        <h1 class="is-size-1 text-weight-thin">{{ unit.name }}</h1></div>
                </div>
            </div>

            <div class="columns is-multiline">

                <div class="column is-12">{{ unit }}</div>
                <div class="column is-12">
                    <a href="{% url 'aix:unit-dashboard' entity_slug=view.kwargs.entity_slug unit_slug=view.kwargs.unit_slug %}"
                       class="btn btn-medium is-info">{% trans 'Dashboard' %}</a>
                    <a href="{% url 'aix:unit-bs' entity_slug=view.kwargs.entity_slug unit_slug=view.kwargs.unit_slug %}"
                       class="btn btn-medium is-info">{% trans 'Balance Sheet' %}</a>
                    <a href="{% url 'aix:unit-ic' entity_slug=view.kwargs.entity_slug unit_slug=view.kwargs.unit_slug %}"
                       class="btn btn-medium is-primary">{% trans 'Income Statement' %}</a>
                </div>

            </div>


        </div>
    </div>
{% endblock %}
