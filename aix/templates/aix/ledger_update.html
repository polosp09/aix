{% extends 'aix/base.html' %}
{% load i18n %}
{% load static %}
{% load aix %}

{% block content %}
    <div class="columns is-centered">
        <div class="column is-4">
            <div class="card">
        <div class="card-body">
                <form action="{% url 'aix:ledger-update' entity_slug=view.kwargs.entity_slug ledger_pk=ledger.uuid %}"
                      method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit"
                            class="btn btn-primary is-fullwidth is-outlined djetler_my_1">Update
                    </button>
                    <a class="btn btn-dark is-small is-fullwidth"
                       href="{% url 'aix:ledger-list' entity_slug=view.kwargs.entity_slug %}">Back</a>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
