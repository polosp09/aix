{% extends 'aix/base.html' %}
{% load i18n %}
{% load static %}
{% load aix %}

{% block content %}
    <div class="columns is-centered">
        <div class="column is-8-tablet is-6-desktop">
            <div class="card">
        <div class="card-body">
                <h3 class="is-size-3 text-centered">{{ page_title }}</h3>
                <p class="has- text-weight-bold text-centered">{{ account }}</p>
                <form action="{% url 'aix:account-create-child' entity_slug=view.kwargs.entity_slug parent_account_pk=view.kwargs.parent_account_pk %}"
                      method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary is-fullwidth djetler_my_1">Submit</button>
                    <a class="btn btn-dark is-small is-fullwidth djetler_my_1"
                       href="{% url 'aix:account-list' entity_slug=view.kwargs.entity_slug %}">Back</a>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
