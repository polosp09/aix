{% extends 'aix/base.html' %}
{% load i18n %}
{% load static %}
{% load aix %}

{% block content %}
    <div class="columns is-centered">
        <div class="column is-8-tablet is-6-desktop">
            <div class="card">
        <div class="card-body">
                <form action="{% url 'aix:ledger-create' entity_slug=view.kwargs.entity_slug %}"
                      method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary is-outlined is-fullwidth djetler_my_1">Create
                    </button>
                    <a href="{% url 'aix:ledger-list' entity_slug=view.kwargs.entity_slug %}"
                       class="btn-sm btn-dark is-fullwidth">Back</a>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
